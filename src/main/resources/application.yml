spring:
  application:
    name: spring-boot-starter-template

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:taskdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:taskuser}
    password: ${DB_PASSWORD:taskpass}
    hikari:
      pool-name: task-pool
      maximum-pool-size: 10

  jpa:
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates that entities match the migrated schema.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

# Do not leak exception details through the default error response; GlobalExceptionHandler owns errors.
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# ---------------------------------------------------------------------------
# Application-specific settings (bound via @ConfigurationProperties)
# ---------------------------------------------------------------------------
app:
  jwt:
    # Base64-encoded HMAC secret (>= 256 bits). MUST be overridden in production via JWT_SECRET.
    secret: ${JWT_SECRET:c3ByaW5nLWJvb3Qtc3RhcnRlci10ZW1wbGF0ZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1ub3c=}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    issuer: spring-boot-starter-template
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  seed:
    # When true, a dev admin user + sample tasks are inserted on startup if the DB is empty.
    enabled: ${SEED_ENABLED:false}

logging:
  level:
    root: INFO
    com.example.taskmanager: ${APP_LOG_LEVEL:INFO}
