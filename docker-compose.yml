# Local development stack: MySQL + the application.
# Usage:  docker compose up --build
services:
  db:
    image: mysql:8.0
    container_name: task-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-taskdb}
      MYSQL_USER: ${DB_USERNAME:-taskuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-taskpass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: task-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-taskdb}
      DB_USERNAME: ${DB_USERNAME:-taskuser}
      DB_PASSWORD: ${DB_PASSWORD:-taskpass}
      JWT_SECRET: ${JWT_SECRET:-c3ByaW5nLWJvb3Qtc3RhcnRlci10ZW1wbGF0ZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1ub3c=}
      SEED_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  mysql-data:
